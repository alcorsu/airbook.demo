<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIRBOOK DEMO</title>

<meta name="theme-color" content="#0F172A">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="180x180" href="05_AIRBOOK_Isotipo2180.png">

<link rel="icon" type="image/png" sizes="192x192" href="05_AIRBOOK_Isotipo2192.png">

<link rel="icon" type="image/png" sizes="512x512" href="05_AIRBOOK_Isotipo512.png">

<style>

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0F172A;
  font-family:Arial,sans-serif;
}

#loader{
  position:fixed;
  inset:0;
  background:#0F172A;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:9999;
  transition:opacity .5s ease;
}

#loader img{
  width:140px;
  margin-bottom:20px;
}

#loader h1{
  margin:0;
  font-size:42px;
}

#loader p{
  opacity:.8;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.hidden{
  opacity:0;
  pointer-events:none;
}

.error-box{
  color:white;
  text-align:center;
  padding:30px;
}

.error-box h2{
  margin-bottom:10px;
}

.error-box p{
  opacity:.8;
}

</style>

<script src="config.js"></script>

</head>

<body>

<div id="loader">

<img src="05_AIRBOOK_Isotipo512.png" alt="AIRBOOK">

<h1>AIRBOOK</h1>

<p>Cargando dashboard...</p>

</div>

<iframe id="appFrame"></iframe>

<script>

const frame = document.getElementById("appFrame");
const loader = document.getElementById("loader");

const webAppUrl =
  window.AIRBOOK_CONFIG &&
  window.AIRBOOK_CONFIG.WEBAPP_URL
    ? window.AIRBOOK_CONFIG.WEBAPP_URL
    : "";

if (webAppUrl) {

  frame.src = webAppUrl;

} else {

  loader.innerHTML =
    "<div class='error-box'>" +
    "<h2>⚠️ Configuración incompleta</h2>" +
    "<p>No se encontró WEBAPP_URL en config.js.</p>" +
    "</div>";

}

frame.onload = () => {

  setTimeout(() => {

    loader.classList.add("hidden");

  }, 1200);

};

</script>

</body>

</html>
