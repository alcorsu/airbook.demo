<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIRBOOK DEMO</title>

<meta name="theme-color" content="#0F172A">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="180x180" href="05_AIRBOOK_Isotipo2180.png">

<link rel="icon" type="image/png" sizes="192x192" href="05_AIRBOOK_Isotipo2192.png">

<link rel="icon" type="image/png" sizes="512x512" href="05_AIRBOOK_Isotipo512.png">

<style>

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0F172A;
  font-family:Arial,sans-serif;
}

#loader{
  position:fixed;
  inset:0;
  background:#0F172A;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:9999;
  transition:opacity .5s ease;
}

#loader img{
  width:140px;
  margin-bottom:20px;
}

#loader h1{
  margin:0;
  font-size:42px;
}

#loader p{
  opacity:.8;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.hidden{
  opacity:0;
  pointer-events:none;
}

</style>

</head>

<body>

<div id="loader">

<img src="05_AIRBOOK_Isotipo512.png" alt="AIRBOOK">

<h1>AIRBOOK</h1>

<p>Cargando dashboard...</p>

</div>

<iframe
id="appFrame"
src="https://script.google.com/macros/s/AKfycbwVCkbOI2Z03meOlUq4pEnY4a_L2XQyMT1ON8fNG8xgO3oX3FkwU2oqVwFeSbGDaghv/exec">
</iframe>

<script>

const frame = document.getElementById("appFrame");
const loader = document.getElementById("loader");

frame.onload = () => {

  setTimeout(() => {

    loader.classList.add("hidden");

  }, 1200);

};

</script>

</body>

</html>
